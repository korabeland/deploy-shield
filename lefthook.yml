# Local quality gates — Tier 1 (pre-commit) and Tier 2 (pre-push).
#
# lefthook 2.x syntax: `jobs`, not the removed v1 `commands`; there is no
# `skip_output` in 2.x. See SPEC.md's "four gate tiers" table — everything
# heavier than a few seconds lives at pre-push, not pre-commit, because past
# ~10s humans and agents reach for `--no-verify`.
#
# Every non-npm binary (gitleaks, shellcheck, yamllint, actionlint,
# osv-scanner) is pinned in mise.toml. Each job that shells out to one of
# them guards with `command -v` first: a missing binary FAILS the hook with
# a "run `mise install`" message — it never silently skips, since a gate
# that skips itself when the tool is absent is a security hole wearing a
# gate's name.
#
# Known limitation (documented in README): GUI git clients often launch
# hooks with a minimal PATH that doesn't include mise's shims dir. If a
# guard below reports a tool "missing" even though `mise install` succeeded,
# add mise's shim directory to that client's PATH.

pre-commit:
  parallel: true
  jobs:
    - name: gitleaks
      run: |
        command -v gitleaks >/dev/null 2>&1 || { echo "gitleaks missing — run 'mise install'"; exit 1; }
        gitleaks git --pre-commit --redact --staged --verbose

    - name: eslint
      glob: "*.{js,jsx,mjs,cjs,ts,tsx}"
      run: pnpm exec eslint --max-warnings 0 {staged_files}

    - name: prettier
      # Scoped to the filetypes .prettierrc.json/.prettierignore actually
      # cover — passing {staged_files} unfiltered hands Prettier files like
      # .editorconfig or mise.toml it has no parser for, which errors
      # rather than skipping when given an explicit path (unlike `prettier
      # --check .`, which self-discovers supported files only).
      glob: "*.{js,jsx,mjs,cjs,ts,tsx,json,yml,yaml}"
      run: pnpm exec prettier --check {staged_files}

    - name: dependency-cruiser
      glob: "*.{js,jsx,mjs,cjs,ts,tsx}"
      run: pnpm exec depcruise --config .dependency-cruiser.cjs {staged_files}

    - name: shellcheck
      glob: "*.sh"
      run: |
        command -v shellcheck >/dev/null 2>&1 || { echo "shellcheck missing — run 'mise install'"; exit 1; }
        shellcheck {staged_files}

    - name: yamllint
      glob: "*.{yml,yaml}"
      run: |
        command -v yamllint >/dev/null 2>&1 || { echo "yamllint missing — run 'mise install'"; exit 1; }
        yamllint -c .yamllint.yml {staged_files}

    - name: actionlint
      glob: ".github/workflows/*.yml"
      run: |
        command -v actionlint >/dev/null 2>&1 || { echo "actionlint missing — run 'mise install'"; exit 1; }
        actionlint {staged_files}

pre-push:
  parallel: true
  jobs:
    - name: test
      run: pnpm test

    - name: typecheck
      run: pnpm typecheck

    - name: jscpd
      run: pnpm exec jscpd .

    - name: changed-coverage
      run: pnpm exec vitest run --coverage && node scripts/changed-coverage.mjs

    - name: audit
      # --audit-level high: SPEC.md calls for a blocking audit; "high" is
      # the sane bar (low/moderate advisories are common in transitive dev
      # tooling and would make this gate noise; critical alone is too
      # permissive for a security-posture template).
      run: pnpm audit --audit-level high

    - name: osv-scanner
      run: |
        command -v osv-scanner >/dev/null 2>&1 || { echo "osv-scanner missing — run 'mise install'"; exit 1; }
        osv-scanner scan --lockfile=pnpm-lock.yaml
