name: Deploy

# Two triggers, two jobs:
#   - `pull_request`  -> preview job: a PR gets a live preview on every push.
#   - `workflow_run`  -> production job: fires only once the CI workflow has
#     completed on `main`. This makes "no green, no deploy" structural even
#     for ruleset-bypassing pushes (admins, `--bypass`) — the production job
#     literally cannot start without a completed CI run to react to.
#
# The `vercel` package was removed as a devDependency (its transitive deps
# failed this repo's own blocking audit gates), so the CLI is invoked via
# `npx --yes vercel@$VERCEL_CLI_VERSION` everywhere below, pinned once here.
on:
  pull_request:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  VERCEL_CLI_VERSION: 56.3.1

permissions:
  contents: read

jobs:
  preview:
    name: preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: preview-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check Vercel secrets are configured
        id: secrets-check
        env:
          HAS_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
          HAS_ORG: ${{ vars.VERCEL_ORG_ID != '' }}
          HAS_PROJECT: ${{ vars.VERCEL_PROJECT_ID != '' }}
        run: |
          if [ "$HAS_TOKEN" = "true" ] && [ "$HAS_ORG" = "true" ] && [ "$HAS_PROJECT" = "true" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets not configured, skipping preview"
          fi

      - uses: actions/checkout@v7
        if: steps.secrets-check.outputs.configured == 'true'

      - run: corepack enable
        if: steps.secrets-check.outputs.configured == 'true'
      # corepack must run before setup-node's `cache: pnpm`, which shells
      # out to `pnpm store path` to locate the cache directory — pnpm has
      # to already be resolvable on PATH for that to work.
      - uses: actions/setup-node@v7
        if: steps.secrets-check.outputs.configured == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.secrets-check.outputs.configured == 'true'

      - name: Deploy preview
        id: deploy
        if: steps.secrets-check.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          # Run from the REPO ROOT, not --cwd services/example-service. The
          # service's Vercel project carries a Root Directory setting instead
          # (scripts/setup.sh applies it). With --cwd, Vercel resolves the
          # pnpm workspace symlink relative to the git root but joins it onto
          # the cwd, producing a doubled path
          # (services/example-service/services/example-service/node_modules/…)
          # and failing every deploy of a workspace-dependent service.
          # Build workspace packages FIRST. contracts' package.json exports
          # point at dist/, so Vercel's file tracer can only follow the
          # import once that output exists — without this the lambda ships
          # without its dependency and 500s on every request.
          pnpm build
          npx --yes vercel@"$VERCEL_CLI_VERSION" pull --yes --environment=preview
          npx --yes vercel@"$VERCEL_CLI_VERSION" build
          url=$(npx --yes vercel@"$VERCEL_CLI_VERSION" deploy --prebuilt)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Post or update sticky preview comment
        if: steps.secrets-check.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          # Comment failure must not fail the job: by this step the deploy
          # has already succeeded, and the job's red/green should report the
          # deploy. A failure here degrades to a ::warning annotation (not
          # continue-on-error, which buries the diagnostics) so a broken
          # token permission stays visible on the run summary.
          post_comment() {
            marker="<!-- deploy-shield-preview -->"
            body=$(cat <<EOF
          ${marker}
          ### Vercel preview deployed

          ${PREVIEW_URL}
          EOF
            )

            # --paginate: without it only the first 30 comments are searched,
            # so long PR threads would accumulate duplicate preview comments.
            existing_id=$(gh api --paginate "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | startswith(\"${marker}\"))][0].id // empty" | head -1)

            if [ -n "$existing_id" ]; then
              gh api "repos/${{ github.repository }}/issues/comments/${existing_id}" \
                -X PATCH -f body="$body"
            else
              gh pr comment "$PR_NUMBER" --body "$body"
            fi
          }

          if ! post_comment; then
            msg="Posting the preview comment failed (likely a github.token permission"
            msg="$msg issue — the job needs pull-requests: write)."
            msg="$msg The deploy itself succeeded: ${PREVIEW_URL}"
            echo "::warning::$msg"
          fi

  production:
    name: production
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # A hung deploy must fail fast: this concurrency group never cancels
    # in-progress runs, so without a timeout one stuck Vercel call would
    # queue every subsequent merge's deploy behind it for hours.
    timeout-minutes: 15
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Check Vercel secrets are configured
        id: secrets-check
        env:
          HAS_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
          HAS_ORG: ${{ vars.VERCEL_ORG_ID != '' }}
          HAS_PROJECT: ${{ vars.VERCEL_PROJECT_ID != '' }}
        run: |
          if [ "$HAS_TOKEN" = "true" ] && [ "$HAS_ORG" = "true" ] && [ "$HAS_PROJECT" = "true" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets not configured, skipping production deploy"
          fi

      # Check out the exact commit CI verified, not the branch tip at event
      # time — a default checkout can race ahead if someone bypass-pushes
      # to main while this deploy is starting.
      - uses: actions/checkout@v7
        if: steps.secrets-check.outputs.configured == 'true'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - run: corepack enable
        if: steps.secrets-check.outputs.configured == 'true'
      - uses: actions/setup-node@v7
        if: steps.secrets-check.outputs.configured == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.secrets-check.outputs.configured == 'true'

      - name: Deploy to production
        id: deploy
        if: steps.secrets-check.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          # Repo root, not --cwd — see the preview job's comment on the
          # workspace-symlink path doubling. `pnpm build` first — see the
          # preview job's comment on why the tracer needs dist/ to exist.
          pnpm build
          npx --yes vercel@"$VERCEL_CLI_VERSION" pull --yes --environment=production
          npx --yes vercel@"$VERCEL_CLI_VERSION" build --prod
          url=$(npx --yes vercel@"$VERCEL_CLI_VERSION" deploy --prebuilt --prod)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      # A deploy that exits 0 proves the upload worked, NOT that the service
      # runs: a lambda missing a dependency deploys green and 500s on every
      # request. Nothing else in the four gate tiers ever executes the built
      # artifact — vitest transpiles TypeScript and tsc only checks types —
      # so this request is the only thing standing between a broken build and
      # production. Previews are not smoke-tested: they sit behind Vercel SSO
      # unless the project configures Protection Bypass for Automation.
      - name: Smoke-test the deployment
        if: steps.secrets-check.outputs.configured == 'true'
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            code=$(curl -s -o /tmp/smoke-body -w '%{http_code}' "$DEPLOY_URL/api/health" || echo 000)
            if [ "$code" = "200" ]; then
              echo "Health check passed (HTTP 200):"
              cat /tmp/smoke-body
              exit 0
            fi
            echo "Attempt $attempt: HTTP $code — retrying in 5s"
            sleep 5
          done
          msg="Smoke test failed. $DEPLOY_URL/api/health returned HTTP $code,"
          msg="$msg not 200. The deployment uploaded but the service does not run."
          echo "::error::$msg"
          cat /tmp/smoke-body || true
          exit 1
